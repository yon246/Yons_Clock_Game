<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clock Game by Yons Lab</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            text-align: center; background-color: #f8fafc; 
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* Flashing Animation for the Clock */
        @keyframes clock-flash {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); background-color: #fee2e2; }
            100% { transform: scale(1); }
        }
        .clock-warning { animation: clock-flash 0.4s infinite; border: 5px solid #ef4444 !important; }

        #game-container { 
            width: 100%; max-width: 400px; background: white; border-radius: 20px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; position: relative; 
        }
        
        .title-bar { background: #1e293b; color: #38bdf8; padding: 15px; font-size: 1.2rem; font-weight: bold; border-bottom: 4px solid #38bdf8; }
        
        .stats-bar { 
            display: flex; justify-content: space-around; background: #f1f5f9; 
            padding: 12px; font-weight: bold; font-size: 0.9rem; color: #475569; border-bottom: 1px solid #e2e8f0; 
        }
        
        #timer-display { color: #ef4444; }
        #lives-display { color: #ef4444; letter-spacing: 2px; }
        .streak-pop { color: #f59e0b; }
        
        #confetti-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; object-fit: cover; }
        
        .clock-wrapper { padding: 20px; display: flex; justify-content: center; align-items: center; }
        canvas { max-width: 100%; height: auto; background: #fff; border-radius: 50%; border: 5px solid transparent; transition: all 0.2s; }
        
        .options { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 0 20px; }
        button { padding: 16px; font-size: 1.2rem; font-weight: 700; cursor: pointer; border: 2px solid #e2e8f0; background: #fff; border-radius: 12px; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        button.correct { background-color: #22c55e !important; color: white; border-color: #16a34a; }
        button.wrong { background-color: #ef4444 !important; color: white; border-color: #dc2626; }
        
        #feedback { margin: 15px 0; font-weight: 800; font-size: 1.1rem; min-height: 1.5em; color: #1e293b; }
        #next-btn { margin: 0 20px 25px 20px; padding: 15px; background: #38bdf8; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; display: none; z-index: 11; }

        #game-over-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(30, 41, 59, 0.95); color: white;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; padding: 20px;
        }
        #game-over-screen h2 { color: #ef4444; font-size: 2.5rem; margin-bottom: 10px; }
        #game-over-screen p { font-size: 1.2rem; margin-bottom: 30px; }
        .reset-btn { background: #38bdf8; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 1.3rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="game-over-screen">
            <h2>GAME OVER</h2>
            <p>Final Score: <span id="final-score">0</span></p>
            <p>Best Streak: 🔥 <span id="final-streak">0</span></p>
            <button class="reset-btn" onclick="resetGame()">Play Again ↻</button>
        </div>

        <div class="title-bar">Clock Game by Yons Lab</div>
        <div class="stats-bar">
            <div>Lives: <span id="lives-display">❤️❤️❤️</span></div>
            <div>Time: <span id="timer-display">10</span>s</div>
            <div>Score: <span id="score">0</span></div>
            <div class="streak-pop">🔥 <span id="streak">0</span></div>
        </div>
        
        <img id="confetti-overlay" src="confetti.gif" alt="Celebration">
        
        <div class="clock-wrapper"><canvas id="clock" width="280" height="280"></canvas></div>
        <div id="feedback">Quick! What time is it?</div>
        
        <div class="options" id="options-container"></div>
        <div style="height: 20px;"></div>
        <button id="next-btn" onclick="generateQuestion()">Next Question ➔</button>
    </div>

<script>
    const canvas = document.getElementById('clock');
    const ctx = canvas.getContext('2d');
    const radius = canvas.height / 2;
    const optionsContainer = document.getElementById('options-container');
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    const confetti = document.getElementById('confetti-overlay');
    const timerDisplay = document.getElementById('timer-display');
    const livesDisplay = document.getElementById('lives-display');
    const gameOverScreen = document.getElementById('game-over-screen');
    
    // SFX Objects
    const sfxCorrect = new Audio('correct.mp3');
    const sfxWrong = new Audio('wrong.mp3');
    const sfxGameOver = new Audio('gameover.mp3');

    let score = 0; let streak = 0; let lives = 3; let maxStreak = 0;
    let currentHour, currentMinute;
    let timeLeft = 10;
    let timerInterval;
    let isWarning = false;

    ctx.translate(radius, radius);

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 10;
        isWarning = false;
        timerDisplay.innerText = timeLeft;
        canvas.classList.remove('clock-warning');

        timerInterval = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;
            if (timeLeft <= 3 && timeLeft > 0) { isWarning = true; canvas.classList.add('clock-warning'); }
            if (timeLeft <= 0) { clearInterval(timerInterval); handleLoss(); }
            drawClock(currentHour, currentMinute);
        }, 1000);
    }

    function handleLoss() {
        lives--;
        streak = 0;
        updateUI();
        canvas.classList.remove('clock-warning');
        isWarning = false;
        drawClock(currentHour, currentMinute);
        sfxWrong.play().catch(()=>{}); 
        
        if (lives <= 0) {
            showGameOver();
        } else {
            const allButtons = optionsContainer.querySelectorAll('button');
            allButtons.forEach(b => b.disabled = true);
            feedback.innerHTML = timeLeft <= 0 ? "Time's up! ⏰" : "Oops! Incorrect.";
            nextBtn.style.display = "block";
        }
    }

    function showGameOver() {
        clearInterval(timerInterval);
        document.getElementById('final-score').innerText = score;
        document.getElementById('final-streak').innerText = maxStreak;
        gameOverScreen.style.display = 'flex';
        sfxGameOver.play().catch(()=>{});
    }

    function resetGame() {
        score = 0; streak = 0; lives = 3; maxStreak = 0;
        gameOverScreen.style.display = 'none';
        updateUI();
        generateQuestion();
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('streak').innerText = streak;
        livesDisplay.innerText = "❤️".repeat(lives);
        if (streak > maxStreak) maxStreak = streak;
    }

    function drawClock(hour, minute) {
        const drawRadius = radius * 0.90;
        ctx.clearRect(-radius, -radius, canvas.width, canvas.height);
        ctx.beginPath(); ctx.arc(0, 0, drawRadius, 0, 2 * Math.PI);
        ctx.fillStyle = (isWarning && timeLeft % 2 === 0) ? '#fee2e2' : 'white';
        ctx.fill();
        ctx.strokeStyle = '#334155'; ctx.lineWidth = 6; ctx.stroke();
        ctx.font = "bold 22px sans-serif"; ctx.textBaseline = "middle"; ctx.textAlign = "center"; ctx.fillStyle = "#1e293b";
        for (let num = 1; num <= 12; num++) {
            let ang = num * Math.PI / 6;
            ctx.rotate(ang); ctx.translate(0, -drawRadius * 0.82); ctx.rotate(-ang);
            ctx.fillText(num.toString(), 0, 0);
            ctx.rotate(ang); ctx.translate(0, drawRadius * 0.82); ctx.rotate(-ang);
        }
        const hourPos = (hour % 12) * Math.PI / 6 + (minute * Math.PI / (6 * 60));
        drawHand(ctx, hourPos, drawRadius * 0.5, 8, "#1e293b");
        const minutePos = (minute * Math.PI / 30);
        drawHand(ctx, minutePos, drawRadius * 0.8, 5, "#38bdf8");
        ctx.beginPath(); ctx.arc(0, 0, 6, 0, 2 * Math.PI);
        ctx.fillStyle = '#1e293b'; ctx.fill();
    }

    function drawHand(ctx, pos, length, width, color) {
        ctx.beginPath(); ctx.lineWidth = width; ctx.lineCap = "round"; ctx.strokeStyle = color;
        ctx.moveTo(0, 0); ctx.rotate(pos); ctx.lineTo(0, -length); ctx.stroke(); ctx.rotate(-pos);
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.rate = 1.0; window.speechSynthesis.speak(msg);
    }

    function generateQuestion() {
        if (lives <= 0) return;
        clearInterval(timerInterval);
        canvas.classList.remove('clock-warning');
        isWarning = false;
        feedback.innerText = "Select the right time!";
        nextBtn.style.display = "none";
        confetti.style.display = "none"; 
        optionsContainer.innerHTML = "";
        currentHour = Math.floor(Math.random() * 12) + 1;
        currentMinute = Math.floor(Math.random() * 12) * 5;
        drawClock(currentHour, currentMinute);
        
        const correctTime = `${currentHour}:${currentMinute.toString().padStart(2, '0')}`;
        let choices = [correctTime];
        while (choices.length < 3) {
            let h = Math.floor(Math.random() * 12) + 1;
            let m = Math.floor(Math.random() * 12) * 5;
            let choice = `${h}:${m.toString().padStart(2, '0')}`;
            if (!choices.includes(choice)) choices.push(choice);
        }
        choices.sort(() => Math.random() - 0.5);
        
        choices.forEach(time => {
            const btn = document.createElement('button');
            btn.innerText = time;
            btn.onclick = () => {
                clearInterval(timerInterval);
                canvas.classList.remove('clock-warning');
                isWarning = false;
                drawClock(currentHour, currentMinute);
                const allButtons = optionsContainer.querySelectorAll('button');
                allButtons.forEach(b => b.disabled = true);
                
                if (time === correctTime) {
                    btn.classList.add('correct');
                    feedback.innerHTML = "Awesome! 🌟";
                    score += 10; streak++;
                    updateUI();
                    sfxCorrect.play().catch(()=>{});
                    confetti.src = "confetti.gif?t=" + new Date().getTime();
                    confetti.style.display = "block"; 
                    setTimeout(() => { confetti.style.display = "none"; }, 3000); 
                    nextBtn.style.display = "block";
                } else {
                    btn.classList.add('wrong');
                    allButtons.forEach(b => { if(b.innerText === correctTime) b.classList.add('correct'); });
                    handleLoss();
                    if (lives > 0) nextBtn.style.display = "block";
                }
                speak(`The time is ${currentHour} ${currentMinute === 0 ? "o'clock" : currentMinute}`);
            };
            optionsContainer.appendChild(btn);
        });
        startTimer();
    }
    generateQuestion();
</script>
</body>
</html>
